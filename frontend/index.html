<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VIGIL-IA · Ingreso</title>
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="login-screen">
    <div class="login-card">
      <div class="brand-mark">VIGIL-IA</div>
      <div class="brand-sub">Panel de Detecciones · Copper Phoenix I</div>

      <form id="login-form" novalidate>
        <div class="field">
          <label for="username">Usuario</label>
          <input id="username" name="username" type="text" autocomplete="username" required />
        </div>
        <div class="field">
          <label for="password">Contraseña</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />
        </div>
        <button type="submit" id="login-submit" class="btn-primary">Ingresar</button>
        <div id="login-error" class="form-error" role="alert"></div>
      </form>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
