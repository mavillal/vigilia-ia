# integration/nginx.conf
# VIGIL-IA · CORFO Semilla Inicia 25INI-282394
#
# Sirve el Panel de Detecciones (frontend/) como archivos estáticos y expone
# el backend (FastAPI) bajo el MISMO origen (mismo host:puerto). Esto elimina
# CORS entre frontend y backend, algo relevante en una red local aislada sin
# salida a internet: no hay necesidad de configurar orígenes cruzados si
# ambos componentes se sirven detrás del mismo proxy.
#
# frontend/js/api.js usa window.location.origin como API_BASE cuando el
# dashboard se abre sin puerto explícito en la URL (ver frontend/README.md),
# que es justamente el caso al navegar a http://<jetson-ip>/ vía este nginx.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;  # contenido de frontend/ (ver docker-compose.yml)
    index index.html;

    # Panel de Detecciones (archivos estáticos, sin build step)
    location / {
        try_files $uri $uri/ =404;
    }

    # Backend — mismas rutas expuestas por backend/main.py, sin prefijo /api,
    # para que coincidan exactamente con lo que espera frontend/js/api.js
    location ~ ^/(auth|detecciones|alertas|resumen|health)(/.*)?$ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
